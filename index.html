<!doctype html>
<html lang="en">
  <head>
    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
  </head>
  <body>
    <div class="sidebar" id="sidebar">
      <nav>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle
            cx="12"
            cy="12"
            r="10"
            stroke="#1a6fd4"
            stroke-width="1.8"
          ></circle>
          <path
            d="M7 12l3 3 7-7"
            stroke="#1a6fd4"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
          <path
            d="M17 7 Q21 12 17 17"
            stroke="#0ea5a0"
            stroke-width="1.4"
            stroke-linecap="round"
            fill="none"
          ></path>
          <path
            d="M7 17 Q3 12 7 7"
            stroke="#0ea5a0"
            stroke-width="1.4"
            stroke-linecap="round"
            fill="none"
          ></path>
        </svg>
        <h3>TaskFlow</h3>
        <button id="sidebarButtonClose" class="hideOneDeskteop">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M11.9584 4.25H12.0416C13.4108 4.24999 14.4957 4.24999 15.3621 4.33812C16.2497 4.42841 16.9907 4.61739 17.639 5.05052C18.1576 5.39707 18.6029 5.84239 18.9495 6.36104C19.3826 7.00926 19.5716 7.7503 19.6619 8.63794C19.75 9.5043 19.75 10.5892 19.75 11.9584V12.0416C19.75 13.4108 19.75 14.4957 19.6619 15.3621C19.5716 16.2497 19.3826 16.9907 18.9495 17.639C18.6029 18.1576 18.1576 18.6029 17.639 18.9495C16.9907 19.3826 16.2497 19.5716 15.3621 19.6619C14.4957 19.75 13.4108 19.75 12.0416 19.75H11.9584C10.5892 19.75 9.5043 19.75 8.63794 19.6619C7.7503 19.5716 7.00926 19.3826 6.36104 18.9495C5.84239 18.6029 5.39707 18.1576 5.05052 17.639C4.61739 16.9907 4.42841 16.2497 4.33812 15.3621C4.24999 14.4957 4.24999 13.4108 4.25 12.0416V11.9584C4.24999 10.5892 4.24999 9.5043 4.33812 8.63794C4.42841 7.7503 4.61739 7.00926 5.05052 6.36104C5.39707 5.84239 5.84239 5.39707 6.36104 5.05052C7.00926 4.61739 7.7503 4.42841 8.63794 4.33812C9.5043 4.24999 10.5892 4.24999 11.9584 4.25ZM14.5303 9.46967C14.8232 9.76256 14.8232 10.2374 14.5303 10.5303L13.0607 12L14.5303 13.4697C14.8232 13.7626 14.8232 14.2374 14.5303 14.5303C14.2374 14.8232 13.7626 14.8232 13.4697 14.5303L12 13.0607L10.5303 14.5303C10.2374 14.8232 9.76256 14.8232 9.46967 14.5303C9.17678 14.2374 9.17678 13.7626 9.46967 13.4697L10.9393 12L9.46967 10.5303C9.17678 10.2374 9.17678 9.76256 9.46967 9.46967C9.76256 9.17678 10.2374 9.17678 10.5303 9.46967L12 10.9393L13.4697 9.46967C13.7626 9.17678 14.2374 9.17678 14.5303 9.46967Z"
                fill="var(--text-main)"
              ></path>
            </g>
          </svg>
        </button>
      </nav>
    </div>

    <div class="main">
      <div class="main-top-pannel">
        <button id="sidebarButtonOpen" class="hideOneDeskteop">
          <svg
          styles="border: 1px solid transparent;"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                d="M5 7H19"
                stroke="var(--text-main)"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
              <path
                d="M5 12L19 12"
                stroke="var(--text-main)"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
              <path
                d="M5 17L19 17"
                stroke="var(--text-main)"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </g>
          </svg>
        </button>
        <h3>My Tasks</h3>
        <button class="theme" id="theme" onclick="darkModus()">🌙</button>
      </div>
      <div class="input-container">
        <input
          type="text"
          id="inputField"
          placeholder="Add new Task..."
          autocomplete="off"
          required
        />
        <button class="add-task" onclick="checkInput()">+ add</button>
        <button class="advanced-task" id="advancedSettingsButton">Advanced</button>
      </div>

      <div class="advanced-settings" id="advancedSettings"><input
          type="text"
          id="discriptionField"
          placeholder="Add Task discription..."
          autocomplete="off"
          required
        />
        <h3 class="priority-text"> High Priority</h3>
        <input type="checkbox" id="priorityCheck">

      </div>

      <div class="task-calculator">
        <div class="task-total"><h4>Total</h4> <h5 id="totalNumber">10</h5></div>
        <div class="task-inprogress"><h4>In Progress</h4> <h5 id="inProgressNumber">20</h5></div>
        <div class="task-done"><h4>Done</h4> <h5 id="doneNumber">30</h5></div>
      </div>

      <div class="taks-container" id="container">

        
          
        

      </div>

    </div>
  </body>
</html>
